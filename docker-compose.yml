services:
  afrikart-app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - FINCRA_API_BASE_URL=${FINCRA_API_BASE_URL:-http://localhost:4000}
      - FINCRA_SECRET_KEY=${FINCRA_SECRET_KEY:-sk_test_afrikart_secret}
      - FINCRA_PUBLIC_KEY=${FINCRA_PUBLIC_KEY:-pk_test_afrikart_public}
      - FINCRA_WEBHOOK_SECRET=${FINCRA_WEBHOOK_SECRET:-whsec_afrikart_secret}
      - DATABASE_PATH=/data/afrikart.db
      - LOG_LEVEL=info
    volumes:
      - app-data:/data

volumes:
  app-data:
